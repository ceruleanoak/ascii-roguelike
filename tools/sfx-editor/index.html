function syncAllUI() {
  const sfx  = appState.sfx;
  const inst = sfx.instrument;

  document.getElementById('sfx-name').value       = sfx.name || 'untitled';
  document.getElementById('bpm').value             = sfx.bpm;
  document.getElementById('snap-mode').value       = sfx.snapMode;
  document.getElementById('total-duration').value  = sfx.totalDuration.toFixed(2);

  // Instrument type
  const isSquare = inst.type === 'square';
  document.getElementById('type-square').classList.toggle('active', isSquare);
  document.getElementById('type-noise').classList.toggle('active', !isSquare);
  document.getElementById('sq-params').style.display        = isSquare ? '' : 'none';
  document.getElementById('noise-params').style.display     = isSquare ? 'none' : '';
  document.getElementById('pitch-env-section').style.display = isSquare ? '' : 'none';

  // Noise subtype
  const isPink = inst.noiseType === 'pink';
  document.getElementById('noise-white').classList.toggle('active', !isPink);
  document.getElementById('noise-pink').classList.toggle('active', isPink);

  // Sliders
  document.getElementById('duty').value         = inst.duty;
  document.getElementById('duty-val').textContent = inst.duty.toFixed(2);
  document.getElementById('noise-filter').value        = inst.noiseFilterFreq;
  document.getElementById('noise-filter-val').textContent = Math.round(inst.noiseFilterFreq);
  document.getElementById('master-gain').value        = inst.masterGain;
  document.getElementById('master-gain-val').textContent = inst.masterGain.toFixed(2);

  // Echo
  const echoBtn = document.getElementById('echo-toggle');
  echoBtn.textContent = sfx.echo.enabled ? 'ON' : 'OFF';
  echoBtn.classList.toggle('active', sfx.echo.enabled);
  document.getElementById('echo-params').style.display = sfx.echo.enabled ? '' : 'none';
  document.getElementById('echo-delay').value         = sfx.echo.delay;
  document.getElementById('echo-delay-val').textContent = sfx.echo.delay.toFixed(2);
  document.getElementById('echo-scale').value         = sfx.echo.scale;
  document.getElementById('echo-scale-val').textContent = sfx.echo.scale.toFixed(2);
  document.getElementById('echo-count').value         = sfx.echo.count;
  document.getElementById('echo-count-val').textContent = sfx.echo.count;
}

document.addEventListener('DOMContentLoaded', () => {
  // Instantiate
  synth       = new SFXSynthesizer();
  exporter    = new Exporter(synth);
  randomizer  = new Randomizer();
  pianoRoll   = new PianoRoll(document.getElementById('piano-roll'));
  volEnvEditor   = new EnvelopeEditor(document.getElementById('vol-env-canvas'),   'volumeEnvelope');
  pitchEnvEditor = new EnvelopeEditor(document.getElementById('pitch-env-canvas'), 'pitchEnvelope');

  // Load persisted user presets
  loadUserPresets();

  // Resize canvases
  setTimeout(() => { resizeEnvCanvases(); resizePianoRoll(); requestRedraw(); }, 50);
  window.addEventListener('resize', () => { resizeEnvCanvases(); resizePianoRoll(); });

  // Toolbar
  document.getElementById('btn-play').addEventListener('click', () => {
    synth.play(appState.sfx);
  });
  document.getElementById('btn-stop').addEventListener('click', () => synth.stop());
  document.getElementById('btn-undo').addEventListener('click', () => undo());
  document.getElementById('btn-export').addEventListener('click', () => exporter.exportWAV());

  // Undo via Ctrl+Z (handled before the focus-guarded keydown below)
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  }, true);

  // Snapshot before any slider drag (fires once per mousedown on a range input)
  document.querySelectorAll('input[type=range]').forEach(el => {
    el.addEventListener('mousedown', pushUndo);
  });

  // Snapshot before editing note number fields
  ['note-freq', 'note-time', 'note-dur'].forEach(id => {
    document.getElementById(id).addEventListener('focus', pushUndo);
  });

  // Preset selector — built-ins auto-load; user presets only select (use LOAD to apply)
  document.getElementById('preset-select').addEventListener('change', e => {
    const val = e.target.value;
    const delBtn  = document.getElementById('btn-del-preset');
    const loadBtn = document.getElementById('btn-load-preset');

    if (!val) {
      delBtn.disabled = true;
      loadBtn.style.display = 'none';
      return;
    }

    if (val.startsWith('__user__')) {
      // User preset: select only — enable LOAD and DEL without loading
      const key = val.slice(8);
      const exists = !!userPresets[key];
      delBtn.disabled  = !exists;
      loadBtn.style.display = exists ? '' : 'none';
      loadBtn.disabled = !exists;
      return;
    }

    // Built-in: auto-load immediately
    if (!PRESETS[val]) return;
    pushUndo();
    const preset = JSON.parse(JSON.stringify(PRESETS[val]));
    for (const note of preset.notes) note.id = uid();
    appState.sfx = preset;
    clearSelection();
    syncAllUI();
    scrollToFitNotes();
    requestRedraw();
    if (synth) synth.play(preset);
    e.target.value = '';
    delBtn.disabled = true;
    loadBtn.style.display = 'none';
  });

  // Load the currently selected user preset
  document.getElementById('btn-load-preset').addEventListener('click', () => {
    const val = document.getElementById('preset-select').value;
    if (!val.startsWith('__user__')) return;
    const key = val.slice(8);
    if (!userPresets[key]) return;
    pushUndo();
    const preset = JSON.parse(JSON.stringify(userPresets[key]));
    for (const note of preset.notes) note.id = uid();
    appState.sfx = preset;
    clearSelection();
    syncAllUI();
    scrollToFitNotes();
    requestRedraw();
    if (synth) synth.play(preset);
  });

  // Save current SFX as user preset
  document.getElementById('btn-save-preset').addEventListener('click', () => {
    const name = (appState.sfx.name || 'untitled').trim();
    userPresets[name] = JSON.parse(JSON.stringify(appState.sfx));
    rebuildPresetDropdown();
    document.getElementById('preset-select').value = '__user__' + name;
    document.getElementById('btn-del-preset').disabled = false;
    document.getElementById('btn-load-preset').style.display = '';
    document.getElementById('btn-load-preset').disabled = false;
    persistUserPresets();
  });

  // Delete the currently selected user preset
  document.getElementById('btn-del-preset').addEventListener('click', () => {
    const val = document.getElementById('preset-select').value;
    if (!val.startsWith('__user__')) return;
    const key = val.slice(8);
    delete userPresets[key];
    rebuildPresetDropdown();
    document.getElementById('preset-select').value = '';
    document.getElementById('btn-del-preset').disabled = true;
    document.getElementById('btn-load-preset').style.display = 'none';
    persistUserPresets();
  });

  document.getElementById('sfx-name').addEventListener('input', e => {
    appState.sfx.name = e.target.value;
  });
  document.getElementById('bpm').addEventListener('input', e => {
    appState.sfx.bpm = parseInt(e.target.value) || 120;
    requestRedraw();
  });
  document.getElementById('snap-mode').addEventListener('change', e => {
    appState.sfx.snapMode = e.target.value;
  });
  document.getElementById('total-duration').addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    if (v > 0) { appState.sfx.totalDuration = v; requestRedraw(); }
  });

  // Instrument type
  document.getElementById('type-square').addEventListener('click', () => {
    pushUndo();
    appState.sfx.instrument.type = 'square';
    document.getElementById('type-square').classList.add('active');
    document.getElementById('type-noise').classList.remove('active');
    document.getElementById('sq-params').style.display = '';
    document.getElementById('noise-params').style.display = 'none';
    document.getElementById('pitch-env-section').style.display = '';
    requestRedraw();
  });
  document.getElementById('type-noise').addEventListener('click', () => {
    pushUndo();
    appState.sfx.instrument.type = 'noise';
    document.getElementById('type-noise').classList.add('active');
    document.getElementById('type-square').classList.remove('active');
    document.getElementById('sq-params').style.display = 'none';
    document.getElementById('noise-params').style.display = '';
    document.getElementById('pitch-env-section').style.display = 'none';
    requestRedraw();
  });

  // Noise subtype
  document.getElementById('noise-white').addEventListener('click', () => {
    pushUndo();
    appState.sfx.instrument.noiseType = 'white';
    document.getElementById('noise-white').classList.add('active');
    document.getElementById('noise-pink').classList.remove('active');
  });
  document.getElementById('noise-pink').addEventListener('click', () => {
    pushUndo();
    appState.sfx.instrument.noiseType = 'pink';
    document.getElementById('noise-pink').classList.add('active');
    document.getElementById('noise-white').classList.remove('active');
  });

  // Param sliders
  function bindSlider(id, valId, key, transform) {
    const el = document.getElementById(id);
    el.addEventListener('input', () => {
      const v = transform ? transform(parseFloat(el.value)) : parseFloat(el.value);
      // Set nested key
      const parts = key.split('.');
      let obj = appState.sfx;
      for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
      obj[parts[parts.length-1]] = v;
      document.getElementById(valId).textContent = v.toFixed(2);
    });
  }
  bindSlider('duty',          'duty-val',          'instrument.duty');
  bindSlider('noise-filter',  'noise-filter-val',  'instrument.noiseFilterFreq', v => Math.round(v));
  bindSlider('master-gain',   'master-gain-val',   'instrument.masterGain');

  // Echo controls
  document.getElementById('echo-toggle').addEventListener('click', () => {
    pushUndo();
    const sfx = appState.sfx;
    sfx.echo.enabled = !sfx.echo.enabled;
    const btn = document.getElementById('echo-toggle');
    btn.textContent = sfx.echo.enabled ? 'ON' : 'OFF';
    btn.classList.toggle('active', sfx.echo.enabled);
    document.getElementById('echo-params').style.display = sfx.echo.enabled ? '' : 'none';
  });

  document.getElementById('echo-delay').addEventListener('input', e => {
    appState.sfx.echo.delay = parseFloat(e.target.value);
    document.getElementById('echo-delay-val').textContent = appState.sfx.echo.delay.toFixed(2);
  });
  document.getElementById('echo-scale').addEventListener('input', e => {
    appState.sfx.echo.scale = parseFloat(e.target.value);
    document.getElementById('echo-scale-val').textContent = appState.sfx.echo.scale.toFixed(2);
  });
  document.getElementById('echo-count').addEventListener('input', e => {
    appState.sfx.echo.count = parseInt(e.target.value);
    document.getElementById('echo-count-val').textContent = appState.sfx.echo.count;
  });

  // Update noise-filter display differently
  document.getElementById('noise-filter').addEventListener('input', e => {
    document.getElementById('noise-filter-val').textContent = Math.round(e.target.value);
  });

  // Randomizer levers
  initDualRange('dr-freq',  'freq-range-lbl',  'freq-range-lbl',  40, 4000, 1,
    (a,b) => `${Math.round(a)} — ${Math.round(b)} Hz`, 'freqRange');
  initDualRange('dr-sweep', 'pitch-sweep-lbl', 'pitch-sweep-lbl', -36, 36, 1,
    (a,b) => `${a>0?'+':''}${Math.round(a)} — ${b>0?'+':''}${Math.round(b)} st`, 'pitchSweep');
  initDualRange('dr-decay', 'decay-lbl',       'decay-lbl',       0.01, 2.0, 0.01,
    (a,b) => `${a.toFixed(2)} — ${b.toFixed(2)} s`, 'decaySpeed');
  initDualRange('dr-count', 'count-lbl',       'count-lbl',       1, 32, 1,
    (a,b) => `${Math.round(a)} — ${Math.round(b)}`, 'noteCount');
  initDualRange('dr-dur',   'dur-lbl',         'dur-lbl',         0.05, 10, 0.05,
    (a,b) => `${a.toFixed(2)} — ${b.toFixed(2)} s`, 'duration');

  // Lock buttons
  const LOCK_KEYS = ['freqRange', 'pitchSweep', 'decaySpeed', 'noteCount', 'duration'];
  const LOCK_IDS  = ['lock-freqRange', 'lock-pitchSweep', 'lock-decaySpeed', 'lock-noteCount', 'lock-duration'];
  LOCK_KEYS.forEach((key, i) => {
    const btn = document.getElementById(LOCK_IDS[i]);
    btn.addEventListener('click', () => {
      const lev = appState.randomizerLevers[key];
      lev.locked = !lev.locked;
      btn.textContent = lev.locked ? '🔒' : '🔓';
      btn.classList.toggle('locked', lev.locked);
    });
  });

  bindNoteInspector();

  document.getElementById('btn-generate').addEventListener('click', () => { pushUndo(); randomizer.generate(); });
  document.getElementById('btn-subtle').addEventListener('click',   () => { pushUndo(); randomizer.subtle(); });
});
